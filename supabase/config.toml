# PAG Payroll Automation - Supabase Local Configuration
# This file controls the LOCAL Supabase stack only (supabase start).
# It does NOT control the hosted Supabase project at offwktjhwfveaearifja.supabase.co.
# For hosted project settings, use the Supabase Dashboard.

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = ""

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"
[storage.image_transformation]
enabled = false

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000/**",
  "https://pag-payroll.netlify.app",
  "https://pag-payroll.netlify.app/**"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
# Signup is disabled - this is a closed payroll system with pre-seeded users only
enable_signup = false

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = true

[auth.external.azure]
enabled = true
client_id = ""
secret = ""
url = ""
redirect_uri = ""

[analytics]
enabled = false
