[[plugins]]
  package = "@netlify/plugin-nextjs"

# Scheduled Functions
[functions]
  directory = "netlify/functions"

# Stage 1: Cycle initiation - nearest working day to 15th at 09:00 London
[[scheduled-functions]]
  function = "initiate-payroll-cycle"
  schedule = "0 9 10-18 * *"

# Stage 8: Payment confirmation - 25th of month at 09:00
[[scheduled-functions]]
  function = "payment-confirmation-reminder"
  schedule = "0 9 25 * *"

# Quarterly report - every 3 months
[[scheduled-functions]]
  function = "quarterly-report"
  schedule = "0 9 1 3,6,9,12 *"

# Email polling - every 15 minutes during business hours
[[scheduled-functions]]
  function = "poll-payroll-inbox"
  schedule = "*/15 8-18 * * 1-5"
